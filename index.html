<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de pesquisa</title>
</head>
<body>
    <header>
        <h1>Pesquisa online</h1>
    </header>
    <section>
        <form action="" method="get">

            <fieldset>
                <legend>Dados Pessoais</legend>
                <label for="name">Nome:</label>
                <input type="text" name="userName" id="name" required>
                <br>
                <label for="idade">Idade</label>
                <input type="number" name="age" id="idade" min="12" max="100" required>
                <br>
                <label for="dataNascimento">Data de nascimento</label>
                <input type="date" id="dataNascimento" name="birthDate">
                <br>
                <label for="emailUsuario">Email</label>
                <input type="email" id="emailUsuario" name="userEmail" required>
                <br>
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="userNumberPhone" pattern="[0-9]{11}" placeholder="DDD + número sem espaços ou hífen">
                <br>
                <label for="imagem">Upload de foto</label>
                <input type="file" id="imagem" accept="image/*" name="userImage">
                <br>
            </fieldset>

            <fieldset>
                <legend>Perfil</legend>

                <p>Gênero:</p>
                <input type="radio" id="fem" name="userGender" value="Feminino">
                <label for="fem">Feminino</label>

                <input type="radio" id="mas" name="userGender" value="Masculino">
                <label for="mas">Masculino</label>

                <input type="radio" id="NotInformed" name="userGender" value="NotInformed">
                <label for="NotInformed">Prefiro não informar</label>
                <br>

                <label for="maritalStatus">Estado cívil</label>
                <select id="maritalStatus" name="maritalStatus">
                    <option value="NotInformed">Selecione...</option>
                    <option value="Casado">Casado</option>
                    <option value="Divorciado">Divorciado</option>
                    <option value="Solteiro">Solteiro</option>
                </select>
                <br>
                <label for="userState">Estado</label>
                <select id="userState" name="userState">
                    <option value="NotInformed">Selecione...</option>
                    <option value="SC">Santa Catarina</option>
                    <option value="PR">Parana</option>
                    <option value="RS">Rio Grande do Sul</option>
                </select>
                <br>

                <label for="cidade">Cidade:</label>
                <input id="cidade" type="text">

                <br>

            </fieldset>
             

            <fieldset>
                <legend>Hábitos</legend>
                <p>Redes sociais:</p>

                <input id="inst" type="checkbox" name="social" value="Instagram">
                <label for="inst">Intagram</label>
                <br>
                <input id="face" type="checkbox" name="social" value="Facebook">
                <label for="face">Facebook</label>
                <br>
                <input id="link" type="checkbox" name="social" value="Linkedin">
                <label for="link">Linkedin</label>
                <br>

                <label for="musicStyle">Estilo musical</label>
                <input list="styleTypes" id="musicStyle" name="userMusic" type="text">
                <datalist id="styleTypes">
                    <option value="Rock">
                    <option value="Pop"> 
                    <option value="Samba">  
                </datalist>

            </fieldset>

            <button type="submit">Enviar</button>

        </form>
    </section>
</body>
</html>
